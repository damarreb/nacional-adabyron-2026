<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 360" font-family="sans-serif">
  <rect x="0" y="0" width="810" height="360" fill="#ffffff"/>
  <text x="405" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Construcción recursiva de la red sobre m cables</text>

  <!-- input cables -->
  <text x="34" y="80"  font-size="13" fill="#333" text-anchor="end">1</text>
  <text x="34" y="120" font-size="13" fill="#333" text-anchor="end">2</text>
  <text x="34" y="160" font-size="13" fill="#333" text-anchor="end">3</text>
  <text x="34" y="200" font-size="13" fill="#333" text-anchor="end">4</text>
  <text x="34" y="255" font-size="13" fill="#333" text-anchor="end">m</text>
  <line x1="44" y1="76"  x2="160" y2="76"  stroke="#333" stroke-width="2"/>
  <line x1="44" y1="116" x2="160" y2="116" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="156" x2="160" y2="156" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="196" x2="160" y2="196" stroke="#333" stroke-width="2"/>
  <text x="100" y="230" font-size="16" fill="#999" text-anchor="middle">&#8942;</text>
  <line x1="44" y1="251" x2="160" y2="251" stroke="#333" stroke-width="2"/>

  <!-- entrada block -->
  <rect x="160" y="58" width="110" height="212" rx="8" fill="#e8eeff" stroke="#3355aa" stroke-width="1.5"/>
  <text x="215" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#223">Columna</text>
  <text x="215" y="169" text-anchor="middle" font-size="14" font-weight="bold" fill="#223">de entrada</text>
  <text x="215" y="196" text-anchor="middle" font-size="11" fill="#556">parejas</text>
  <text x="215" y="211" text-anchor="middle" font-size="11" fill="#556">(1,2),(3,4)&#8230;</text>

  <!-- entrada -> subredes: 1er cable de cada pareja arriba, 2o abajo -->
  <line x1="270" y1="76"  x2="378" y2="86"  stroke="#2e8b57" stroke-width="1.8"/>
  <line x1="270" y1="156" x2="378" y2="120" stroke="#2e8b57" stroke-width="1.8"/>
  <line x1="270" y1="116" x2="378" y2="238" stroke="#c0504d" stroke-width="1.8"/>
  <line x1="270" y1="196" x2="378" y2="272" stroke="#c0504d" stroke-width="1.8"/>
  <text x="320" y="74"  font-size="10.5" fill="#2e8b57" text-anchor="middle">1&#186; de cada pareja</text>
  <text x="323" y="205" font-size="10.5" fill="#c0504d" text-anchor="middle">2&#186; de cada pareja</text>

  <!-- superior subnet -->
  <rect x="380" y="70" width="200" height="95" rx="8" fill="#e6f6ea" stroke="#2e8b57" stroke-width="1.5"/>
  <text x="480" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#154">Subred superior</text>
  <text x="480" y="133" text-anchor="middle" font-size="12" fill="#255">&#8968;m/2&#8969; cables</text>

  <!-- inferior subnet -->
  <rect x="380" y="193" width="200" height="95" rx="8" fill="#fdeaea" stroke="#c0504d" stroke-width="1.5"/>
  <text x="480" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#611">Subred inferior</text>
  <text x="480" y="256" text-anchor="middle" font-size="12" fill="#822">&#8970;m/2&#8971; cables</text>

  <!-- subredes -> salida -->
  <line x1="580" y1="100" x2="688" y2="86"  stroke="#2e8b57" stroke-width="1.8"/>
  <line x1="580" y1="130" x2="688" y2="156" stroke="#2e8b57" stroke-width="1.8"/>
  <line x1="580" y1="225" x2="688" y2="116" stroke="#c0504d" stroke-width="1.8"/>
  <line x1="580" y1="255" x2="688" y2="196" stroke="#c0504d" stroke-width="1.8"/>

  <!-- salida block -->
  <rect x="690" y="58" width="105" height="212" rx="8" fill="#e8eeff" stroke="#3355aa" stroke-width="1.5"/>
  <text x="742" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#223">Columna</text>
  <text x="742" y="169" text-anchor="middle" font-size="14" font-weight="bold" fill="#223">de salida</text>
  <text x="742" y="196" text-anchor="middle" font-size="11" fill="#556">mismas</text>
  <text x="742" y="211" text-anchor="middle" font-size="11" fill="#556">parejas</text>
</svg>
