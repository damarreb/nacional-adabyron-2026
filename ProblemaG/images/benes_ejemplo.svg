<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="sans-serif">
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">La red sobre 4 posiciones aplicada al primer caso de ejemplo</text>

  <!-- column headers -->
  <text x="210" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Entrada</text>
  <text x="397" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Subredes</text>
  <text x="580" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Salida</text>

  <!-- position labels -->
  <text x="80" y="94"  text-anchor="end" font-size="13" fill="#333">pos 1</text>
  <text x="80" y="164" text-anchor="end" font-size="13" fill="#333">pos 2</text>
  <text x="80" y="234" text-anchor="end" font-size="13" fill="#333">pos 3</text>
  <text x="80" y="304" text-anchor="end" font-size="13" fill="#333">pos 4</text>

  <!-- wires (with hops where a switch connector crosses an uninvolved wire) -->
  <line x1="95" y1="90"  x2="665" y2="90"  stroke="#333" stroke-width="2"/>
  <path d="M95 160 H352 Q360 148 368 160 H665" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M95 230 H427 Q435 218 443 230 H665" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="95" y1="300" x2="665" y2="300" stroke="#333" stroke-width="2"/>

  <!-- ===== Entrada ===== -->
  <!-- S1 (1,2): sin cruce -->
  <line x1="210" y1="90" x2="210" y2="160" stroke="#bbb" stroke-width="3"/>
  <circle cx="210" cy="90"  r="5" fill="#bbb"/>
  <circle cx="210" cy="160" r="5" fill="#bbb"/>
  <text x="210" y="78" text-anchor="middle" font-size="11" fill="#999">(1,2)</text>

  <!-- S2 (3,4): cuadrilla 2 -->
  <line x1="210" y1="230" x2="210" y2="300" stroke="#dd6b20" stroke-width="3"/>
  <circle cx="210" cy="230" r="5" fill="#dd6b20"/>
  <circle cx="210" cy="300" r="5" fill="#dd6b20"/>
  <text x="210" y="218" text-anchor="middle" font-size="11" fill="#a1521a">(3,4)</text>
  <rect x="224" y="256" width="26" height="17" rx="4" fill="#dd6b20"/>
  <text x="237" y="269" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">C2</text>

  <!-- ===== Subred superior: switch (1,3) ===== -->
  <line x1="360" y1="90" x2="360" y2="230" stroke="#6b46c1" stroke-width="3"/>
  <circle cx="360" cy="90"  r="5" fill="#6b46c1"/>
  <circle cx="360" cy="230" r="5" fill="#6b46c1"/>
  <text x="360" y="78" text-anchor="middle" font-size="11" fill="#4c327f">(1,3)</text>
  <rect x="372" y="142" width="52" height="17" rx="4" fill="#6b46c1"/>
  <text x="398" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">C1, C2</text>

  <!-- ===== Subred inferior: switch (2,4) ===== -->
  <line x1="435" y1="160" x2="435" y2="300" stroke="#2b6cb0" stroke-width="3"/>
  <circle cx="435" cy="160" r="5" fill="#2b6cb0"/>
  <circle cx="435" cy="300" r="5" fill="#2b6cb0"/>
  <text x="435" y="148" text-anchor="middle" font-size="11" fill="#1d4b7a">(2,4)</text>
  <rect x="449" y="221" width="26" height="17" rx="4" fill="#2b6cb0"/>
  <text x="462" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">C1</text>

  <!-- ===== Salida: sin cruce ===== -->
  <line x1="580" y1="90" x2="580" y2="160" stroke="#bbb" stroke-width="3"/>
  <circle cx="580" cy="90"  r="5" fill="#bbb"/>
  <circle cx="580" cy="160" r="5" fill="#bbb"/>
  <text x="580" y="78" text-anchor="middle" font-size="11" fill="#999">(1,2)</text>
  <line x1="580" y1="230" x2="580" y2="300" stroke="#bbb" stroke-width="3"/>
  <circle cx="580" cy="230" r="5" fill="#bbb"/>
  <circle cx="580" cy="300" r="5" fill="#bbb"/>
  <text x="580" y="218" text-anchor="middle" font-size="11" fill="#999">(3,4)</text>

  <!-- legend -->
  <rect x="150" y="344" width="14" height="14" rx="3" fill="#2b6cb0"/>
  <text x="170" y="356" font-size="12" fill="#333">cuadrilla 1</text>
  <rect x="270" y="344" width="14" height="14" rx="3" fill="#dd6b20"/>
  <text x="290" y="356" font-size="12" fill="#333">cuadrilla 2</text>
  <rect x="390" y="344" width="14" height="14" rx="3" fill="#6b46c1"/>
  <text x="410" y="356" font-size="12" fill="#333">ambas</text>
  <rect x="480" y="344" width="14" height="14" rx="3" fill="#bbb"/>
  <text x="500" y="356" font-size="12" fill="#333">interruptor sin cruce (no genera orden)</text>
</svg>
